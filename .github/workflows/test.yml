name: RESA Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Prettier Check
        run: npm run format:check

  test-php:
    name: PHP Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml
          coverage: none

      - name: Composer Install
        run: composer install --prefer-dist --no-progress

      - name: PHPUnit
        run: vendor/bin/phpunit

  test-js:
    name: JS Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Vitest
        run: npx vitest run

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test-php, test-js]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          MYSQL_DATABASE=resa_dev
          MYSQL_USER=resa
          MYSQL_PASSWORD=resa_secret
          MYSQL_ROOT_PASSWORD=root_secret
          WP_ADMIN_USER=admin
          WP_ADMIN_PASSWORD=admin
          WP_ADMIN_EMAIL=admin@example.com
          WP_URL=http://localhost:8080
          EOF

      - name: Start Docker Compose
        run: |
          docker compose up -d
          echo "Waiting for WordPress to be healthy..."
          timeout 120 bash -c 'until curl -sf http://localhost:8080/ > /dev/null 2>&1; do sleep 5; done'

      - name: Setup WordPress
        run: docker compose run --rm wpcli

      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Activate Plugin
        run: |
          docker compose exec -T wordpress wp plugin activate resa --allow-root

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run E2E Tests
        run: npx playwright test
        env:
          CI: true
          WP_URL: http://localhost:8080

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down -v
